<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Project: Calculator</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casing-calculator">
        <div class="sub-container screen" >
            <div class=" screen-my">0</div>
        </div>
        <div class="sub-container">
            <button class="num">1</button>
            <button class="num">2</button>
            <button class="num">3</button>
            <button class="arit">:</button>

        </div>
        <div class="sub-container">
            <button class="num">4</button>
            <button class="num">5</button>
            <button class="num">6</button>
            <button class="arit">x</button>

        </div>
        <div class="sub-container">
            <button class="num">7</button>
            <button class="num">8</button>
            <button class="num">9</button>
            <button class="num">-</button>
        </div>
        <div class="sub-container">
            <button class="num">0</button>
            <button class="num">.</button>
            <button class="num">=</button>
            <button class="num">+</button>
        </div>
            <div class="sub-container last">
            <button class="num ac">AC</button>
            <!-- <button class="num">.</button>
            <button class="num">=</button>
            <button class="num">+</button> -->
        </div>
